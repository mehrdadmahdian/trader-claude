# Redis configuration for trader-claude

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# RDB file
dbfilename dump.rdb
dir /data

# AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
