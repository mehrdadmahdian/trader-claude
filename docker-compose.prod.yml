services:
  mysql:
    image: mysql:8.0
    container_name: trader_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trader}
      MYSQL_USER: ${MYSQL_USER:-trader}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-traderpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trader_net_prod

  redis:
    image: redis:7-alpine
    container_name: trader_redis_prod
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_prod_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader_net_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: trader_backend_prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: production
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - trader_net_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: trader_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "80:80"
    networks:
      - trader_net_prod

volumes:
  mysql_prod_data:
  redis_prod_data:

networks:
  trader_net_prod:
    driver: bridge
